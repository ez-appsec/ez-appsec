# ez-appsec CI/CD Pipeline
# Stages: lint, test, build, deploy

stages:
  - lint
  - test
  - build
  - deploy
  - release

# Variables
variables:
  REGISTRY_IMAGE: $CI_REGISTRY_IMAGE
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  PYTHON_VERSION: "3.11"

# Default configuration
default:
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ============================================
# LINT STAGE
# ============================================

lint:python:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --no-cache-dir pylint flake8 black isort
  script:
    - echo "🔍 Linting Python code with flake8..."
    - flake8 ez_appsec tests --count --select=E9,F63,F7,F82 --show-source --statistics
    - echo "✓ flake8 passed"
    
    - echo "🔍 Checking code style with black..."
    - black --check ez_appsec tests || true
    - echo "ℹ️  black formatting suggestions noted (not enforced)"
    
    - echo "🔍 Checking import sorting with isort..."
    - isort --check-only ez_appsec tests || true
    - echo "ℹ️  isort suggestions noted (not enforced)"
    
    - echo "🔍 Linting with pylint..."
    - pylint ez_appsec --exit-zero --max-line-length=120
    - echo "✓ Pylint checks completed"
  allow_failure: false
  # tags:
  #   - docker

lint:docker:
  stage: lint
  image: hadolint/hadolint:latest-debian
  script:
    - echo "🔍 Linting Dockerfile..."
    - hadolint Dockerfile
    - echo "✓ Dockerfile linting passed"
    
    - echo "🔍 Linting Dockerfile.slim..."
    - hadolint Dockerfile.slim
    - echo "✓ Dockerfile.slim linting passed"
  allow_failure: true
  # tags:
  #   - docker

# ============================================
# TEST STAGE
# ============================================

test:unit:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --no-cache-dir -r requirements.txt
    - pip install --no-cache-dir -e .
    - pip install --no-cache-dir pytest pytest-cov pytest-xdist
  script:
    - echo "🧪 Running unit tests with pytest..."
    - pytest tests/ -v --cov=ez_appsec --cov-report=term-missing --cov-report=xml --cov-report=html -n auto
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    paths:
      - htmlcov/
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: false
  # tags:
  #   - docker

test:security:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install --no-cache-dir bandit safety
  script:
    - echo "🔒 Running security checks with bandit..."
    - bandit -r ez_appsec -ll --exit-zero || true
    - echo "✓ Bandit checks completed"
    
    - echo "🔒 Checking dependencies with safety..."
    - pip install -r requirements.txt
    - safety check --json || true
    - echo "✓ Safety checks completed"
  allow_failure: true
  # tags:
  #   - docker

# ============================================
# BUILD STAGE
# ============================================

build:docker:standard:
  stage: build
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  before_script:
    - echo "📦 Building Docker image..."
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - echo "🐳 Building standard Docker image ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker build -t ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - echo "📊 Image info:"
    - docker images ${REGISTRY_IMAGE}
    - echo "🧪 Testing image functionality..."
    - docker run --rm ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} --version
    - docker run --rm ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} --help
    - echo "⬆️  Pushing standard image..."
    - docker push ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
  only:
    - merge_requests
    - main
    - tags
  # tags:
  #   - docker
  allow_failure: false

build:docker:slim:
  stage: build
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - echo "🐳 Building slim Docker image ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA}"
    - docker build -f Dockerfile.slim -t ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} .
    - echo "📊 Image info:"
    - docker images ${REGISTRY_IMAGE}
    - echo "⬆️  Pushing slim image..."
    - docker push ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA}
  only:
    - merge_requests
    - main
    - tags
  # tags:
  #   - docker
  allow_failure: true

build:docker:micro:
  stage: build
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - echo "🐳 Building micro Docker image ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA}"
    - docker build -f Dockerfile.micro -t ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} .
    - echo "📊 Image info:"
    - docker images ${REGISTRY_IMAGE}
    - echo "⬆️  Pushing micro image..."
    - docker push ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA}
  only:
    - merge_requests
    - main
    - tags
  # tags:
  #   - docker
  allow_failure: true

build:docker:semgrep:
  stage: build
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - echo "🐳 Building semgrep Docker image ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA}"
    - docker build -f Dockerfile.semgrep -t ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} .
    - echo "📊 Image info:"
    - docker images ${REGISTRY_IMAGE}
    - echo "⬆️  Pushing semgrep image..."
    - docker push ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA}
  only:
    - merge_requests
    - main
    - tags
  # tags:
  #   - docker
  allow_failure: true

# ============================================
# DEPLOY STAGE
# ============================================

publish:docker:
  stage: deploy
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker pull ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker pull ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} || true
    - docker pull ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} || true
    - docker pull ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} || true
  script:
    - echo "📤 Publishing Docker images to registry..."

    - echo "🏷️  Tagging and pushing standard image..."
    - docker tag ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:latest
    - docker tag ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker push ${REGISTRY_IMAGE}:latest
    - docker push ${REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}

    - echo "🏷️  Tagging and pushing slim image..."
    - |
      if docker image inspect ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} > /dev/null 2>&1; then
        docker tag ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:slim
        docker tag ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:slim-${CI_COMMIT_REF_SLUG}
        docker push ${REGISTRY_IMAGE}:slim
        docker push ${REGISTRY_IMAGE}:slim-${CI_COMMIT_REF_SLUG}
      else
        echo "⚠️  slim image not found, skipping"
      fi

    - echo "🏷️  Tagging and pushing micro image..."
    - |
      if docker image inspect ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} > /dev/null 2>&1; then
        docker tag ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:micro
        docker tag ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:micro-${CI_COMMIT_REF_SLUG}
        docker push ${REGISTRY_IMAGE}:micro
        docker push ${REGISTRY_IMAGE}:micro-${CI_COMMIT_REF_SLUG}
      else
        echo "⚠️  micro image not found, skipping"
      fi

    - echo "🏷️  Tagging and pushing semgrep image..."
    - |
      if docker image inspect ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} > /dev/null 2>&1; then
        docker tag ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:semgrep
        docker tag ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_REF_SLUG}
        docker push ${REGISTRY_IMAGE}:semgrep
        docker push ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_REF_SLUG}
      else
        echo "⚠️  semgrep image not found, skipping"
      fi

    - echo "✅ Docker images published successfully"
  only:
    - main
    - tags
  # tags:
  #   - docker
  allow_failure: false

# ── Auto-bump patch version on push to main ───────────────────────────────────
# Increments the patch component of VERSION (e.g. 0.1.0 → 0.1.1) and commits
# it via the GitLab Files API.  The resulting commit triggers a new pipeline
# where version:tag picks up the new version and creates the git tag.
# The commit-message guard prevents the bump from running again on that pipeline.
# Requires PROJECT_ACCESS_TOKEN CI variable (api scope, Developer+ role).

version:bump:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache python3
  script:
    - VERSION=$(cat VERSION)
    - MAJOR=$(echo "$VERSION" | cut -d. -f1)
    - MINOR=$(echo "$VERSION" | cut -d. -f2)
    - PATCH=$(echo "$VERSION" | cut -d. -f3)
    - export NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
    - echo "Bumping VERSION ${VERSION} → ${NEW_VERSION}..."
    - |
      python3 << 'EOF'
      import os, json
      import urllib.request, urllib.parse

      new_version = os.environ["NEW_VERSION"]
      token       = os.environ["PROJECT_ACCESS_TOKEN"]
      api_url     = os.environ["CI_API_V4_URL"]
      project_id  = urllib.parse.quote(os.environ["CI_PROJECT_ID"], safe="")

      url     = f"{api_url}/projects/{project_id}/repository/files/VERSION"
      payload = json.dumps({
          "branch":         "main",
          "content":        new_version + "\n",
          "commit_message": f"chore: bump version to {new_version}",
      }).encode()
      req = urllib.request.Request(url, data=payload, method="PUT", headers={
          "PRIVATE-TOKEN": token,
          "Content-Type":  "application/json",
      })
      urllib.request.urlopen(req)
      print(f"✅ VERSION bumped to {new_version}")
      EOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore: bump version/'
  needs: []

# ── Auto-tag from VERSION file ────────────────────────────────────────────────
# Reads the VERSION file and creates a git tag via the GitLab API if it doesn't
# already exist. This triggers a tag pipeline which builds + releases the images.
# Requires a CI variable PROJECT_ACCESS_TOKEN with api scope (Developer+ role).

version:tag:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl python3
  script:
    - VERSION=$(cat VERSION)
    - echo "Checking for tag v${VERSION}..."
    - |
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags/v${VERSION}")
      if [ "$HTTP_STATUS" != "404" ]; then
        echo "ℹ️  Tag v${VERSION} already exists, skipping"
        exit 0
      fi
    - echo "Updating README title to v${VERSION}..."
    - |
      python3 << 'EOF'
      import os, json, base64, re, sys
      import urllib.request, urllib.parse

      token      = os.environ["PROJECT_ACCESS_TOKEN"]
      api_url    = os.environ["CI_API_V4_URL"]
      project_id = urllib.parse.quote(os.environ["CI_PROJECT_ID"], safe="")
      version    = open("VERSION").read().strip()

      # Fetch current README
      url = f"{api_url}/projects/{project_id}/repository/files/README.md?ref=main"
      req = urllib.request.Request(url, headers={"PRIVATE-TOKEN": token})
      data = json.loads(urllib.request.urlopen(req).read())
      content = base64.b64decode(data["content"]).decode()

      # Replace version in title line
      new_content = re.sub(r"^# ez-appsec.*", f"# ez-appsec v{version}", content, flags=re.MULTILINE)
      if new_content == content:
          print(f"README already shows v{version}, skipping commit")
          sys.exit(0)

      # Commit the update — [skip ci] prevents a redundant pipeline
      payload = json.dumps({
          "branch": "main",
          "content": new_content,
          "commit_message": f"chore: update README version to v{version} [skip ci]",
      }).encode()
      url = f"{api_url}/projects/{project_id}/repository/files/README.md"
      req = urllib.request.Request(url, data=payload, method="PUT", headers={
          "PRIVATE-TOKEN": token,
          "Content-Type": "application/json",
      })
      urllib.request.urlopen(req)
      print(f"✅ README updated to v{version}")
      EOF
    - echo "Creating tag v${VERSION} on ${CI_COMMIT_SHA}..."
    - |
      # Tag the current commit (the version bump commit), NOT the latest branch
      # tip — the README update commit that follows has [skip ci] which would
      # cause the tag pipeline to be skipped.
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        --header "Content-Type: application/json" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags" \
        --data "{\"tag_name\": \"v${VERSION}\", \"ref\": \"${CI_COMMIT_SHA}\"}"
      echo "✅ Tag v${VERSION} created — release pipeline triggered"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: []

# ── Publish versioned Docker images on tag pipeline ───────────────────────────
# Pulls the SHA-tagged images pushed by the build jobs and retags them with the
# version tag (e.g. v0.1.0, slim-v0.1.0, …).  Does NOT rebuild.

publish:docker:tags:
  stage: deploy
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  needs:
    - job: build:docker:standard
    - job: build:docker:slim
      optional: true
    - job: build:docker:micro
      optional: true
    - job: build:docker:semgrep
      optional: true
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - docker pull ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker pull ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} || true
    - docker pull ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} || true
    - docker pull ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} || true
  script:
    - TAG=${CI_COMMIT_TAG}
    - echo "📤 Publishing versioned Docker images for ${TAG}..."

    - docker tag ${REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:${TAG}
    - docker push ${REGISTRY_IMAGE}:${TAG}
    - echo "✅ Pushed ${REGISTRY_IMAGE}:${TAG}"

    - |
      if docker image inspect ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} > /dev/null 2>&1; then
        docker tag ${REGISTRY_IMAGE}:slim-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:slim-${TAG}
        docker push ${REGISTRY_IMAGE}:slim-${TAG}
        echo "✅ Pushed ${REGISTRY_IMAGE}:slim-${TAG}"
      else
        echo "⚠️  slim image not found, skipping"
      fi

    - |
      if docker image inspect ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} > /dev/null 2>&1; then
        docker tag ${REGISTRY_IMAGE}:micro-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:micro-${TAG}
        docker push ${REGISTRY_IMAGE}:micro-${TAG}
        echo "✅ Pushed ${REGISTRY_IMAGE}:micro-${TAG}"
      else
        echo "⚠️  micro image not found, skipping"
      fi

    - |
      if docker image inspect ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} > /dev/null 2>&1; then
        docker tag ${REGISTRY_IMAGE}:semgrep-${CI_COMMIT_SHORT_SHA} ${REGISTRY_IMAGE}:semgrep-${TAG}
        docker push ${REGISTRY_IMAGE}:semgrep-${TAG}
        echo "✅ Pushed ${REGISTRY_IMAGE}:semgrep-${TAG}"
      else
        echo "⚠️  semgrep image not found, skipping"
      fi

    - echo "✅ All versioned images published for ${TAG}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  allow_failure: false

# ============================================
# RELEASE STAGE
# ============================================

# Generates release notes from git log and creates a GitLab release.
# Runs after versioned Docker images are published on tag pipelines.

release:create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: publish:docker:tags
  before_script:
    - apk add --no-cache git
  script:
    - git fetch --tags --unshallow 2>/dev/null || git fetch --tags || true
    - VERSION=$(cat VERSION)
    - |
      PREV_TAG=$(git tag --sort=-version:refname | grep -v "^v${VERSION}$" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
      echo "## Changes" > RELEASE_NOTES.md
      echo "" >> RELEASE_NOTES.md
      if [ -n "$PREV_TAG" ]; then
        echo "Changes since ${PREV_TAG}:" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        git log "${PREV_TAG}..v${VERSION}" --pretty=format:"- %s" --no-merges >> RELEASE_NOTES.md
      else
        echo "Initial release." >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        git log --pretty=format:"- %s" --no-merges | head -30 >> RELEASE_NOTES.md
      fi
      echo "" >> RELEASE_NOTES.md
      echo "" >> RELEASE_NOTES.md
      echo "## Docker Images" >> RELEASE_NOTES.md
      echo "" >> RELEASE_NOTES.md
      echo "| Variant | Tag |" >> RELEASE_NOTES.md
      echo "|---------|-----|" >> RELEASE_NOTES.md
      echo "| Standard (all scanners) | \`${REGISTRY_IMAGE}:v${VERSION}\` |" >> RELEASE_NOTES.md
      echo "| Slim                    | \`${REGISTRY_IMAGE}:slim-v${VERSION}\` |" >> RELEASE_NOTES.md
      echo "| Micro (no semgrep)      | \`${REGISTRY_IMAGE}:micro-v${VERSION}\` |" >> RELEASE_NOTES.md
      echo "| Semgrep                 | \`${REGISTRY_IMAGE}:semgrep-v${VERSION}\` |" >> RELEASE_NOTES.md
      echo "" >> RELEASE_NOTES.md
      echo "**Full Changelog**: [CHANGELOG.md](CHANGELOG.md)" >> RELEASE_NOTES.md
    - cat RELEASE_NOTES.md
  release:
    name: "Release v$CI_COMMIT_TAG"
    description: "./RELEASE_NOTES.md"
    tag_name: "$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  allow_failure: false

# ============================================
# PAGES DEPLOYMENT
# ============================================

pages:
  stage: deploy
  image: python:${PYTHON_VERSION}-slim
  script:
    - echo "📄 Preparing GitLab Pages..."
    - mkdir -p public
    - cp -r web/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  # tags:
  #   - docker
  allow_failure: false
