name: Dashboard Update

on:
  workflow_dispatch:
    inputs:
      project_slug:
        description: "Project slug (e.g. juice-shop-public)"
        required: false
      run_id:
        description: "Source run ID to fetch artifacts from"
        required: false

permissions:
  contents: read
  actions: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.EZ_APPSEC_APP_ID }}
          private-key: ${{ secrets.EZ_APPSEC_PRIVATE_KEY }}
          owner: ez-appsec
          repositories: ez-appsec

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.token }}

      - name: Download scan artifacts from source repos
        run: |
          for repo in juice-shop-public; do
            mkdir -p github/dashboard/public/data/vulnerabilities
            LATEST_RUN=$(gh run list --repo ez-appsec/$repo --workflow ez-appsec-scan.yml \
              --status success --limit 1 --json databaseId -q '.[0].databaseId')
            if [ -n "$LATEST_RUN" ]; then
              gh run download $LATEST_RUN \
                --repo ez-appsec/$repo \
                --pattern "ez-appsec-vulns-*" \
                -D /tmp/dl-$repo || true
              # Place vulnerabilities.json at flat path data/vulnerabilities/<repo>.json
              find /tmp/dl-$repo -name "vulnerabilities.json" -exec cp {} \
                github/dashboard/public/data/vulnerabilities/$repo.json \; || true
            fi
          done
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}

      - name: Run aggregation script
        run: python3 aggregate-index.py
        working-directory: github/dashboard

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github/dashboard/public/data/
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
