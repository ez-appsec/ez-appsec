# Semantic Release Workflow
# Automatically manages versioning, changelog, and releases based on commit messages.
# Also builds and publishes Docker images for each release.

name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  security-events: write   # SARIF upload from release-scan job

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic_release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic_release.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Record tag before release
        id: before
        run: |
          git fetch --tags origin
          echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      - name: Run Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new release and set outputs
        id: semantic_release
        run: |
          git fetch --tags origin
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo none)
          BEFORE="${{ steps.before.outputs.tag }}"
          if [ "$AFTER" != "$BEFORE" ] && [ "$AFTER" != "none" ]; then
            echo "new_release_published=true"  >> "$GITHUB_OUTPUT"
            echo "new_release_version=${AFTER#v}" >> "$GITHUB_OUTPUT"
            echo "Released: $AFTER"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "No new release (latest tag: $AFTER)"
          fi

      # @semantic-release/git plugin already commits VERSION + CHANGELOG.md
      # and pushes back to main — no separate step needed.

  build-docker-standard:
    name: Build Standard Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push standard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}
            org.opencontainers.image.title=ez-appsec
            org.opencontainers.image.description=AI-powered application security scanning
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-docker-slim:
    name: Build Slim Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slim image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/Dockerfile.slim
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim-v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}-slim
            org.opencontainers.image.title=ez-appsec-slim
            org.opencontainers.image.description=AI-powered application security scanning (slim variant)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-docker-micro:
    name: Build Micro Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push micro image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/Dockerfile.micro
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:micro-v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:micro
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}-micro
            org.opencontainers.image.title=ez-appsec-micro
            org.opencontainers.image.description=AI-powered application security scanning (micro variant without semgrep)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-docker-semgrep:
    name: Build Semgrep Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push semgrep image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/Dockerfile.semgrep
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:semgrep-v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:semgrep
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}-semgrep
            org.opencontainers.image.title=ez-appsec-semgrep
            org.opencontainers.image.description=Semgrep-only container for ez-appsec
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  update-screenshots:
    name: Regenerate Dashboard Screenshots
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Pull latest (semantic-release may have just pushed)
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Generate screenshots
        run: python3 docs/screenshots/generate.py

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/*.png
          git diff --staged --quiet || \
            git commit -m "docs: regenerate dashboard screenshots for v${{ needs.semantic-release.outputs.new_release_version }} [skip ci]"
          git push origin main

      - name: Upload screenshots to GitHub Release
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          for f in docs/screenshots/*.png; do
            gh release upload "v${VERSION}" "$f" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-scan:
    name: Release Security Scan
    runs-on: ubuntu-latest
    needs: [semantic-release, build-docker-standard]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    outputs:
      findings-count: ${{ steps.count.outputs.findings-count }}
      critical-count: ${{ steps.count.outputs.critical-count }}
      high-count: ${{ steps.count.outputs.high-count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ez-appsec scan via release image
        # Scans with the exact image that was just published — validates the
        # image works AND produces the official security posture for this release.
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          mkdir -p scan-results
          docker run --rm \
            -v "$(pwd):/scan" \
            -w /scan \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${VERSION} \
            github-scan . --output scan-results/ez-appsec.sarif --severity medium

      - name: Generate vulnerabilities.json
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          docker run --rm \
            -v "$(pwd):/scan" \
            -w /scan \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${VERSION} \
            web-report . --output scan-results

      - name: Count findings
        id: count
        run: |
          python3 - << 'PYEOF'
          import json, os

          sarif = json.load(open("scan-results/ez-appsec.sarif"))
          results = sarif["runs"][0]["results"]
          total = len(results)

          severity_map = {"error": "critical", "warning": "high", "note": "medium"}
          counts = {"critical": 0, "high": 0, "medium": 0, "low": 0}
          for r in results:
              level = r.get("level", "note")
              sev = severity_map.get(level, "low")
              counts[sev] = counts.get(sev, 0) + 1

          output_file = os.environ["GITHUB_OUTPUT"]
          with open(output_file, "a") as f:
              f.write(f"findings-count={total}\n")
              f.write(f"critical-count={counts['critical']}\n")
              f.write(f"high-count={counts['high']}\n")

          print(f"Total: {total}  Critical: {counts['critical']}  High: {counts['high']}")
          PYEOF

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-results/ez-appsec.sarif
          category: release-scan
        continue-on-error: true

      - name: Upload scan artifacts to GitHub Release
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          gh release upload "v${VERSION}" scan-results/ez-appsec.sarif --clobber
          if [ -f scan-results/vulnerabilities.json ]; then
            gh release upload "v${VERSION}" scan-results/vulnerabilities.json --clobber
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mint App token for dashboard push
        id: dash-token
        if: vars.EZ_APPSEC_DASHBOARD_REPO != '' && secrets.EZ_APPSEC_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.EZ_APPSEC_APP_ID }}
          private-key: ${{ secrets.EZ_APPSEC_PRIVATE_KEY }}
          owner: ez-appsec
          repositories: ez-appsec-dashboard

      - name: Push scan results to dashboard
        env:
          _PUSH_TOKEN: ${{ steps.dash-token.outputs.token }}
          EZ_APPSEC_DASHBOARD_REPO: ${{ vars.EZ_APPSEC_DASHBOARD_REPO || 'ez-appsec/ez-appsec-dashboard' }}
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
        run: |
          if [ -z "${_PUSH_TOKEN}" ]; then
            echo "No push token available — skipping dashboard update."
            exit 0
          fi
          if [ ! -f scan-results/vulnerabilities.json ]; then
            echo "vulnerabilities.json not found — skipping dashboard update."
            exit 0
          fi
          SLUG="ez-appsec-ez-appsec"
          DASH_DIR=$(mktemp -d)
          git clone \
            "https://x-access-token:${_PUSH_TOKEN}@github.com/${EZ_APPSEC_DASHBOARD_REPO}.git" \
            "${DASH_DIR}/dashboard"
          mkdir -p "${DASH_DIR}/dashboard/data/projects/${SLUG}"
          cp scan-results/vulnerabilities.json \
            "${DASH_DIR}/dashboard/data/projects/${SLUG}/vulnerabilities.json"
          cat > "${DASH_DIR}/dashboard/data/projects/${SLUG}/meta.json" << METAEOF
          {
            "project_name": "ez-appsec",
            "project_path": "ez-appsec/ez-appsec",
            "github_url": "https://github.com/ez-appsec/ez-appsec",
            "version": "v${VERSION}",
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          METAEOF
          cd "${DASH_DIR}/dashboard"
          git config user.name "ez-appsec release"
          git config user.email "ci@ez-appsec.ai"
          git add data/projects/
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update scan results for ez-appsec v${VERSION}"
          git push origin main
          rm -rf "${DASH_DIR}"

  update-github-release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    needs: [semantic-release, build-docker-standard, build-docker-slim, build-docker-micro, build-docker-semgrep, update-screenshots, release-scan]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release with Docker Info
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          FINDINGS="${{ needs.release-scan.outputs.findings-count }}"
          CRITICAL="${{ needs.release-scan.outputs.critical-count }}"
          HIGH="${{ needs.release-scan.outputs.high-count }}"

          {
            echo "## Security Scan"
            echo ""
            echo "This release was scanned with ez-appsec v${VERSION}."
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| Critical | ${CRITICAL} |"
            echo "| High     | ${HIGH} |"
            echo "| Total (medium+) | ${FINDINGS} |"
            echo ""
            echo "📊 Full results: [ez-appsec.sarif](https://github.com/${IMAGE_NAME}/releases/download/v${VERSION}/ez-appsec.sarif) · [vulnerabilities.json](https://github.com/${IMAGE_NAME}/releases/download/v${VERSION}/vulnerabilities.json)"
            echo ""
            echo "## Docker Images"
            echo ""
            echo "| Variant | Tag |"
            echo "|---------|-----|"
            echo "| Standard (all scanners) | \`${REGISTRY}/${IMAGE_NAME}:v${VERSION}\` |"
            echo "| Standard (latest)      | \`${REGISTRY}/${IMAGE_NAME}:latest\` |"
            echo "| Slim                    | \`${REGISTRY}/${IMAGE_NAME}:slim-v${VERSION}\` |"
            echo "| Slim (latest)          | \`${REGISTRY}/${IMAGE_NAME}:slim\` |"
            echo "| Micro (no semgrep)      | \`${REGISTRY}/${IMAGE_NAME}:micro-v${VERSION}\` |"
            echo "| Micro (latest)          | \`${REGISTRY}/${IMAGE_NAME}:micro\` |"
            echo "| Semgrep                 | \`${REGISTRY}/${IMAGE_NAME}:semgrep-v${VERSION}\` |"
            echo "| Semgrep (latest)        | \`${REGISTRY}/${IMAGE_NAME}:semgrep\` |"
            echo ""
            echo "### Quick Start"
            echo ""
            echo '```bash'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:v${VERSION}"
            echo "docker run --rm ${REGISTRY}/${IMAGE_NAME}:v${VERSION} --version"
            echo '```'
          } > /tmp/release_addendum.md

          # Fetch existing release notes then append
          gh release view "v${VERSION}" --json body -q .body > /tmp/existing_notes.md
          cat /tmp/existing_notes.md /tmp/release_addendum.md > /tmp/release_notes.md
          gh release edit "v${VERSION}" --notes-file /tmp/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
