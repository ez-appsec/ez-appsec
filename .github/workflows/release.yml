# Semantic Release Workflow
# Automatically manages versioning, changelog, and releases based on commit messages.
# Also builds and publishes Docker images for each release.

name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        id: semantic_release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update VERSION file
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          echo "${{ steps.semantic_release.outputs.new_release_version }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "chore(release): ${{ steps.semantic_release.outputs.new_release_version }} [skip ci]"
          git push

  build-docker-standard:
    name: Build Standard Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push standard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}
            org.opencontainers.image.title=ez-appsec
            org.opencontainers.image.description=AI-powered application security scanning
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-docker-slim:
    name: Build Slim Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push slim image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim-v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}-slim
            org.opencontainers.image.title=ez-appsec-slim
            org.opencontainers.image.description=AI-powered application security scanning (slim variant)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-docker-micro:
    name: Build Micro Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push micro image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.micro
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:micro-v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:micro
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}-micro
            org.opencontainers.image.title=ez-appsec-micro
            org.opencontainers.image.description=AI-powered application security scanning (micro variant without semgrep)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-docker-semgrep:
    name: Build Semgrep Docker Image
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push semgrep image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.semgrep
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:semgrep-v${{ needs.semantic-release.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:semgrep
          labels: |
            org.opencontainers.image.version=${{ needs.semantic-release.outputs.new_release_version }}-semgrep
            org.opencontainers.image.title=ez-appsec-semgrep
            org.opencontainers.image.description=Semgrep-only container for ez-appsec
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  update-github-release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    needs: [semantic-release, build-docker-standard, build-docker-slim, build-docker-micro, build-docker-semgrep]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release with Docker Info
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_version }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"

          {
            echo "## Docker Images"
            echo ""
            echo "| Variant | Tag |"
            echo "|---------|-----|"
            echo "| Standard (all scanners) | \`${REGISTRY}/${IMAGE_NAME}:v${VERSION}\` |"
            echo "| Standard (latest)      | \`${REGISTRY}/${IMAGE_NAME}:latest\` |"
            echo "| Slim                    | \`${REGISTRY}/${IMAGE_NAME}:slim-v${VERSION}\` |"
            echo "| Slim (latest)          | \`${REGISTRY}/${IMAGE_NAME}:slim\` |"
            echo "| Micro (no semgrep)      | \`${REGISTRY}/${IMAGE_NAME}:micro-v${VERSION}\` |"
            echo "| Micro (latest)          | \`${REGISTRY}/${IMAGE_NAME}:micro\` |"
            echo "| Semgrep                 | \`${REGISTRY}/${IMAGE_NAME}:semgrep-v${VERSION}\` |"
            echo "| Semgrep (latest)        | \`${REGISTRY}/${IMAGE_NAME}:semgrep\` |"
            echo ""
            echo "### Quick Start"
            echo ""
            echo '```bash'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:v${VERSION}"
            echo "docker run --rm ${REGISTRY}/${IMAGE_NAME}:v${VERSION} --version"
            echo '```'
          } > DOCKER_INFO.md

          # Get existing release notes
          EXISTING_NOTES=$(gh release view "v${VERSION}" --json body -q .body)

          # Append Docker info to release notes
          cat > RELEASE_NOTES.md << EOF
${EXISTING_NOTES}

$(cat DOCKER_INFO.md)
EOF

          # Update the GitHub release
          gh release edit "v${VERSION}" --notes-file RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
