name: Set GHCR Package Public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  set-public:
    runs-on: ubuntu-latest
    steps:
      - name: Set ez-appsec package to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -f visibility=public \
            orgs/ez-appsec/packages/container/ez-appsec
          echo "Done — checking visibility:"
          gh api orgs/ez-appsec/packages/container/ez-appsec --jq .visibility

