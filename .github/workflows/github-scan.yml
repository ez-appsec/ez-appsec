# GitHub Actions workflow to perform project scan and publish results to GitHub Security tab.
# This workflow runs ez-appsec security scans and uploads SARIF results to GitHub.

name: ez-appsec Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  security-events: write  # Required for SARIF upload to Security tab
  actions: read
  pull-requests: write  # Required for PR comments

env:
  EZ_APPSEC_VERSION: "0.1.17"

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    outputs:
      findings-count: ${{ steps.summary.outputs.findings-count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install external scanners
        run: |
          # Install gitleaks
          wget -q https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.18.4_linux_x64.tar.gz
          tar xzf gitleaks_8.18.4_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks_8.18.4_linux_x64.tar.gz

          # Install semgrep
          pip install semgrep

          # Install kics
          wget -q https://github.com/Checkmarx/kics/releases/download/v1.7.11/kics_1.7.11_linux_x64.tar.gz
          tar xzf kics_1.7.11_linux_x64.tar.gz
          sudo mv kics /usr/local/bin/
          rm kics_1.7.11_linux_x64.tar.gz

          # Install grype
          wget -q https://raw.githubusercontent.com/anchore/grype/main/install.sh -O - | sh -s -- -b /usr/local/bin

          # Verify installations
          echo "=== Scanner Versions ==="
          gitleaks version || echo "gitleaks not found"
          semgrep --version || echo "semgrep not found"
          kics version || echo "kics not found"
          grype --version || echo "grype not found"

      - name: Install ez-appsec from source
        run: |
          pip install .

      - name: Run ez-appsec scan
        id: scan
        env:
          EZ_APPSEC_OUTPUT_DIR: "scan-results"
          EZ_APPSEC_SARIF: "${{ env.EZ_APPSEC_OUTPUT_DIR }}/ez-appsec.sarif"
        run: |
          set -e
          echo "Running ez-appsec scan..."
          mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"

          echo "Checking ez-appsec installation..."
          ez-appsec --version || echo "Version check failed"
          ez-appsec status || echo "Status check failed (may be expected)"

          echo "Starting GitHub SARIF scan..."
          SEVERITY="${{ github.event_name == 'pull_request' && 'all' || 'medium' }}"
          echo "Severity level: $SEVERITY"
          ez-appsec github-scan . --output "${EZ_APPSEC_SARIF}" --severity "$SEVERITY"

          echo "Scan completed. Checking for output file..."
          if [ -f "${EZ_APPSEC_SARIF}" ]; then
            echo "SARIF file created successfully"
            ls -lh "${EZ_APPSEC_SARIF}"
          else
            echo "ERROR: SARIF file not created at ${EZ_APPSEC_SARIF}"
            exit 1
          fi
        continue-on-error: false

      - name: Count findings
        id: summary
        env:
          EZ_APPSEC_SARIF: "scan-results/ez-appsec.sarif"
        run: |
          if [ -f "${EZ_APPSEC_SARIF}" ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('${EZ_APPSEC_SARIF}'))['runs'][0]['results']))")
            echo "findings-count=$COUNT" >> $GITHUB_OUTPUT
            echo "Found $COUNT security findings"
          else
            echo "findings-count=0" >> $GITHUB_OUTPUT
            echo "No findings found"
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-results/ez-appsec.sarif
        continue-on-error: true

      - name: Upload scan results as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ez-appsec-scan-${{ github.sha }}
          path: scan-results/
          retention-days: 7
          if-no-files-found: warn

      - name: Comment on PR with findings
        if: github.event_name == 'pull_request' && steps.scan.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.summary.outputs.findings-count }}';
            const artifactUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            let body = `## 🔒 Security Scan Results\n\n`;
            body += `**Findings:** ${count}\n\n`;
            body += `📊 [View full scan results](${artifactUrl})\n\n`;
            body += `💡 Use \`ez-appsec github-scan\` in your local environment for detailed analysis.\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🔒 Security Scan Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
