# ez-appsec scanning ez-appsec — dogfooding.
#
# Installs ez-appsec from source (no pre-built image needed) so every
# change to the scanner is immediately tested against the codebase itself.
# External scanners are installed directly on the runner.
#
# Results are uploaded to the GitHub Security tab (SARIF) and posted as a
# PR comment. On pushes to main, results are also pushed to the dashboard.

name: ez-appsec Self-Scan

on:
  push:
    branches:
      - main
      - '**'   # remove after merging to main; kept so CI runs during the PR phase
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF upload to Security tab
  pull-requests: write     # PR comments
  actions: read

env:
  OUTPUT_DIR: scan-results
  SARIF_FILE: scan-results/ez-appsec.sarif
  VULNS_FILE: scan-results/vulnerabilities.json

jobs:
  scan:
    name: Self-Scan
    runs-on: ubuntu-latest
    outputs:
      findings-count: ${{ steps.count.outputs.findings-count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Install ez-appsec from source
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ez-appsec
        run: pip install -e .

      # -----------------------------------------------------------------------
      # Install external scanners
      # -----------------------------------------------------------------------
      - name: Install gitleaks
        run: |
          VERSION="v8.30.1"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Install semgrep
        run: |
          pip install semgrep
          semgrep --version

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.110.0
          grype version

      - name: Scanner status
        run: ez-appsec status

      # -----------------------------------------------------------------------
      # Run scan
      # -----------------------------------------------------------------------
      - name: Run ez-appsec scan (SARIF)
        id: scan
        run: |
          mkdir -p "${OUTPUT_DIR}"
          SEVERITY="${{ github.event_name == 'pull_request' && 'all' || 'medium' }}"
          echo "Severity: $SEVERITY"
          ez-appsec github-scan . --output "${SARIF_FILE}" --severity "$SEVERITY"
          ls -lh "${SARIF_FILE}"

      - name: Count findings
        id: count
        run: |
          COUNT=$(python3 -c "
          import json
          data = json.load(open('${SARIF_FILE}'))
          print(len(data['runs'][0]['results']))
          ")
          echo "findings-count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Findings: $COUNT"

      - name: Generate vulnerabilities.json
        id: web-report
        run: ez-appsec web-report . --output "${OUTPUT_DIR}"
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Upload results
      # -----------------------------------------------------------------------
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.SARIF_FILE }}
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ez-appsec-self-scan-${{ github.sha }}
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 30
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # Push to dashboard (main branch only)
      # -----------------------------------------------------------------------
      - name: Mint App token for dashboard push
        id: dash-token
        if: steps.web-report.outcome == 'success' && github.event_name != 'pull_request' && vars.EZ_APPSEC_DASHBOARD_REPO != '' && secrets.EZ_APPSEC_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.EZ_APPSEC_APP_ID }}
          private-key: ${{ secrets.EZ_APPSEC_PRIVATE_KEY }}
          owner: ez-appsec
          repositories: ez-appsec-dashboard

      - name: Push to dashboard
        if: steps.web-report.outcome == 'success' && github.event_name != 'pull_request'
        env:
          _PUSH_TOKEN: ${{ steps.dash-token.outputs.token }}
          EZ_APPSEC_DASHBOARD_REPO: ${{ vars.EZ_APPSEC_DASHBOARD_REPO || 'ez-appsec/ez-appsec-dashboard' }}
        run: |
          if [ -z "${_PUSH_TOKEN}" ]; then
            echo "No push token available — skipping dashboard update."
            exit 0
          fi
          if [ ! -f "${VULNS_FILE}" ]; then
            echo "vulnerabilities.json not found — skipping."
            exit 0
          fi
          SLUG=$(echo "${{ github.repository }}" | tr '/._[:upper:]' '---_[:lower:]')
          DASH_DIR=$(mktemp -d)
          git clone "https://x-access-token:${_PUSH_TOKEN}@github.com/${EZ_APPSEC_DASHBOARD_REPO}.git" \
            "${DASH_DIR}/dashboard"
          mkdir -p "${DASH_DIR}/dashboard/data/projects/${SLUG}"
          cp "${VULNS_FILE}" "${DASH_DIR}/dashboard/data/projects/${SLUG}/vulnerabilities.json"
          cat > "${DASH_DIR}/dashboard/data/projects/${SLUG}/meta.json" << METAEOF
          {
            "project_name": "${{ github.event.repository.name }}",
            "project_path": "${{ github.repository }}",
            "github_url": "https://github.com/${{ github.repository }}",
            "default_branch": "${{ github.event.repository.default_branch }}",
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          METAEOF
          cd "${DASH_DIR}/dashboard"
          git config user.name "ez-appsec scan"
          git config user.email "ci@ez-appsec.ai"
          git add data/projects/
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update scan results for ${{ github.repository }}"
          git push origin main
          rm -rf "${DASH_DIR}"

      # -----------------------------------------------------------------------
      # PR comment
      # -----------------------------------------------------------------------
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.scan.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.count.outputs.findings-count }}';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const severity = 'all';

            let body = `## 🔒 ez-appsec Self-Scan Results\n\n`;
            body += `| Scanner | Status |\n|---------|--------|\n`;
            body += `| gitleaks | ✓ secrets detection |\n`;
            body += `| semgrep  | ✓ SAST |\n`;
            body += `| grype    | ✓ dependency CVEs |\n\n`;
            body += `**Total findings (severity: ${severity}):** ${count}\n\n`;
            body += `📊 [View full results and artifacts](${runUrl})\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('ez-appsec Self-Scan Results')
            );
            const payload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };
            if (existing) {
              await github.rest.issues.updateComment({ ...payload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...payload, issue_number: context.issue.number });
            }
