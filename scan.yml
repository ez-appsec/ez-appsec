# GitLab workflow template to perform project scan and publish results to the group dashboard.
# Requires EZ_APPSEC_DASHBOARD_PROJECT to be set (e.g. my-group/ez-appsec-dashboard).
# Run /ez-appsec-install-dashboard <group-path> to create and configure the dashboard project.

stages:
  - ez-appsec

variables:
  EZ_APPSEC_VERSION: "latest"
  EZ_APPSEC_IMAGE: "registry.gitlab.com/jfelten.work-group/ez_appsec/ez_appsec:$EZ_APPSEC_VERSION"

# Shared script fragment — ingest scan results into the dashboard repo via SSH deploy key.
# EZ_APPSEC_DASHBOARD_DEPLOY_KEY must be a CI file-type variable containing the private key.
.ingest-script: &ingest-script
  - apk add --no-cache git python3 openssh-client
  - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  - cp "${EZ_APPSEC_DASHBOARD_DEPLOY_KEY}" ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
  - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
  - export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
  - git config --global user.email "ci@ez-appsec.ai"
  - git config --global user.name "ez-appsec CI"
  - git clone "git@gitlab.com:${EZ_APPSEC_DASHBOARD_PROJECT}.git" /tmp/dash-work
  - mkdir -p "/tmp/dash-work/public/data/projects/${CI_PROJECT_PATH_SLUG}"
  - cp "${CI_PROJECT_DIR}/${EZ_APPSEC_REPORT}" "/tmp/dash-work/public/data/projects/${CI_PROJECT_PATH_SLUG}/vulnerabilities.json"
  - printf '{"gitlab_url":"https://%s","project_id":"%s","project_path":"%s","ez_appsec_version":"%s"}\n' "${CI_SERVER_HOST}" "${CI_PROJECT_ID}" "${CI_PROJECT_PATH}" "${EZ_APPSEC_VERSION:-latest}" > "/tmp/dash-work/public/data/projects/${CI_PROJECT_PATH_SLUG}/config.json"
  - 'EZ_APPSEC_REPORT="/tmp/dash-work/public/data/projects/${CI_PROJECT_PATH_SLUG}/vulnerabilities.json" python3 -c "import json,os;from datetime import datetime,timezone;r=json.load(open(os.environ[\"EZ_APPSEC_REPORT\"]));v=r.get(\"vulnerabilities\",[]);s={\"total\":len(v),\"critical\":sum(1 for x in v if x.get(\"severity\")==\"critical\"),\"high\":sum(1 for x in v if x.get(\"severity\")==\"high\"),\"medium\":sum(1 for x in v if x.get(\"severity\")==\"medium\"),\"low\":sum(1 for x in v if x.get(\"severity\")==\"low\")};e={\"slug\":os.environ[\"CI_PROJECT_PATH_SLUG\"],\"name\":os.environ[\"CI_PROJECT_NAME\"],\"path\":os.environ[\"CI_PROJECT_PATH\"],\"last_updated\":datetime.now(timezone.utc).strftime(\"%Y-%m-%dT%H:%M:%SZ\"),\"summary\":s};f=\"/tmp/dash-work/public/data/index.json\";d=json.load(open(f)) if os.path.exists(f) else {\"projects\":[]};d[\"projects\"]=[p for p in d.get(\"projects\",[]) if p.get(\"slug\")!=e[\"slug\"]]+[e];d[\"last_updated\"]=e[\"last_updated\"];json.dump(d,open(f,\"w\"),indent=2)"'
  - git -C /tmp/dash-work add public/data/
  - 'git -C /tmp/dash-work diff --cached --quiet && echo "No changes" || git -C /tmp/dash-work commit -m "chore: ingest scan results from ${CI_PROJECT_PATH}"'
  - git -C /tmp/dash-work push origin main

scan:pipeline:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
    EZ_APPSEC_REPORT: "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json"
  script:
    - echo "Running ez-appsec scan..."
    - mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"
    - ez-appsec status || true
    - ez-appsec gitlab-scan . --output "${EZ_APPSEC_REPORT}"
  artifacts:
    name: "ez-appsec-scan-${CI_COMMIT_SHA}"
    paths:
      - "${EZ_APPSEC_REPORT}"
    expire_in: 7 days
    when: always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: never
    - if: '$EZ_APPSEC_COLD_SCAN == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual

update:vulns:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  needs:
    - job: scan:pipeline
      artifacts: true
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
    EZ_APPSEC_REPORT: "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json"
  script:
    - *ingest-script
  rules:
    - if: '$EZ_APPSEC_DASHBOARD_PROJECT == null'
      when: never
    - if: '$EZ_APPSEC_DASHBOARD_DEPLOY_KEY == null'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: never
    - if: '$EZ_APPSEC_COLD_SCAN == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual

cold:scan:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
    EZ_APPSEC_REPORT: "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json"
  script:
    - echo "Running cold scan..."
    - mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"
    - ez-appsec status || true
    - ez-appsec gitlab-scan . --output "${EZ_APPSEC_REPORT}"
    - *ingest-script
  artifacts:
    name: "ez-appsec-cold-scan-${CI_COMMIT_SHA}"
    paths:
      - "${EZ_APPSEC_REPORT}"
    expire_in: 7 days
    when: always
  rules:
    - if: '$EZ_APPSEC_DASHBOARD_PROJECT == null'
      when: never
    - if: '$EZ_APPSEC_DASHBOARD_DEPLOY_KEY == null'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: always
    - if: '$EZ_APPSEC_COLD_SCAN == "true"'
      when: always
    - when: never
