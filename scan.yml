# GitLab workflow template to perform project scan and expose GitLab-formatted results as artifacts

stages:
  - ez-appsec
  - deploy

variables:
  EZ_APPSEC_BRANCH: "ez-appsec-pages"
  EZ_APPSEC_VERSION: "latest"
  EZ_APPSEC_IMAGE: "registry.gitlab.com/jfelten.work-group/ez_appsec/ez_appsec:$EZ_APPSEC_VERSION"

initialize:web:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  script:
    - apk add --no-cache git
    - git config user.email "ci@ez-appsec.ai"
    - git config user.name "ez-appsec CI"
    - git fetch origin "${EZ_APPSEC_BRANCH}" || true
    - git checkout -B "${EZ_APPSEC_BRANCH}" "origin/${EZ_APPSEC_BRANCH}" 2>/dev/null || git checkout -B "${EZ_APPSEC_BRANCH}"
    - mkdir -p public
    - cp -r /web/* public/
    - git add public/
    - 'git diff --cached --quiet && echo "No changes to web content" || git commit -m "chore: update web content from main"'
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${EZ_APPSEC_BRANCH}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $EZ_APPSEC_BRANCH'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - web/**/*
      when: always
    - when: manual

scan:pipeline:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
    EZ_APPSEC_REPORT: "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json"

  script:
    - echo "🔎 Running ez-appsec scan..."
    - mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"
    - ez-appsec status || true
    - ez-appsec gitlab-scan . --output "${EZ_APPSEC_REPORT}"

  artifacts:
    name: "ez-appsec-scan-${CI_COMMIT_SHA}"
    paths:
      - "${EZ_APPSEC_REPORT}"
    expire_in: 7 days
    when: always

  rules:
    - if: '$CI_COMMIT_BRANCH == $EZ_APPSEC_BRANCH'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: never
    - if: '$EZ_APPSEC_COLD_SCAN == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual

update:vulns:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  needs:
    - job: scan:pipeline
      artifacts: true
  script:
    - apk add --no-cache git
    - git config user.email "ci@ez-appsec.ai"
    - git config user.name "ez-appsec CI"
    - git fetch origin "${EZ_APPSEC_BRANCH}" || true
    - git checkout -B "${EZ_APPSEC_BRANCH}" "origin/${EZ_APPSEC_BRANCH}" 2>/dev/null || git checkout -B "${EZ_APPSEC_BRANCH}"
    - mkdir -p public/data
    - cp "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json" public/data/vulnerabilities.json
    - |
      printf '{"gitlab_url":"https://%s","project_id":"%s","project_path":"%s","default_branch":"%s","ez_appsec_version":"%s"}\n' \
        "${CI_SERVER_HOST}" "${CI_PROJECT_ID}" "${CI_PROJECT_PATH}" "${CI_DEFAULT_BRANCH:-main}" \
        "${EZ_APPSEC_VERSION}" > public/data/config.json
    - git add public/data/vulnerabilities.json public/data/config.json
    - 'git diff --cached --quiet && echo "No vulnerability report changes" || git commit -m "chore: update vulnerability report"'
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${EZ_APPSEC_BRANCH}"
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
  rules:
    - if: '$CI_COMMIT_BRANCH == $EZ_APPSEC_BRANCH'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: never
    - if: '$EZ_APPSEC_COLD_SCAN == "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual

cold:scan:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
    EZ_APPSEC_REPORT: "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json"
  script:
    - echo "🔎 Running cold scan..."
    - mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"
    - ez-appsec status || true
    - ez-appsec gitlab-scan . --output "${EZ_APPSEC_REPORT}"
    - apk add --no-cache git curl
    - git config user.email "ci@ez-appsec.ai"
    - git config user.name "ez-appsec CI"
    - git fetch origin "${EZ_APPSEC_BRANCH}" || true
    - git checkout -B "${EZ_APPSEC_BRANCH}" "origin/${EZ_APPSEC_BRANCH}" 2>/dev/null || git checkout -B "${EZ_APPSEC_BRANCH}"
    - mkdir -p public/data
    - cp "${EZ_APPSEC_REPORT}" public/data/vulnerabilities.json
    - |
      printf '{"gitlab_url":"https://%s","project_id":"%s","project_path":"%s","default_branch":"%s","ez_appsec_version":"%s"}\n' \
        "${CI_SERVER_HOST}" "${CI_PROJECT_ID}" "${CI_PROJECT_PATH}" "${CI_DEFAULT_BRANCH:-main}" \
        "${EZ_APPSEC_VERSION}" > public/data/config.json
    - git add public/data/vulnerabilities.json public/data/config.json
    - 'git diff --cached --quiet && echo "No changes" || git commit -m "chore: cold scan - update vulnerability report"'
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${EZ_APPSEC_BRANCH}"
    - |
      curl --silent --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --form "ref=${EZ_APPSEC_BRANCH}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipeline" || echo "Could not trigger pages deploy pipeline"
  artifacts:
    name: "ez-appsec-cold-scan-${CI_COMMIT_SHA}"
    paths:
      - "${EZ_APPSEC_REPORT}"
    expire_in: 7 days
    when: always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: always
    - if: '$EZ_APPSEC_COLD_SCAN == "true"'
      when: always
    - when: never

pages:
  stage: deploy
  image: alpine:3.18
  script:
    - echo "Deploying public/ to GitLab Pages"
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $EZ_APPSEC_BRANCH'
      when: always
