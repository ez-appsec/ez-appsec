# GitLab workflow template to perform project scan and expose GitLab-formatted results as artifacts

stages:
  - ez-appsec
  - deploy

variables:
  EZ_APPSEC_BRANCH: "ez-appsec-pages"
  EZ_APPSEC_IMAGE: "registry.gitlab.com/jfelten.work-group/ez_appsec/ez_appsec:micro"

initialize:web:
  stage: ez-appsec
  image: alpine:3.18
  script:
    - apk add --no-cache git
    - git config user.email "ci@ez-appsec.ai"
    - git config user.name "ez-appsec CI"
    - git fetch origin "${EZ_APPSEC_BRANCH}" || true
    - git checkout -B "${EZ_APPSEC_BRANCH}" "origin/${EZ_APPSEC_BRANCH}" 2>/dev/null || git checkout -B "${EZ_APPSEC_BRANCH}"
    - mkdir -p public
    - |
      if [ -d "web" ]; then
        cp -r web/* public/
      else
        git clone --depth 1 "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/jfelten.work-group/ez_appsec/ez_appsec.git" /tmp/ez-appsec-src
        cp -r /tmp/ez-appsec-src/web/* public/
        rm -rf /tmp/ez-appsec-src
      fi
    - git add public/
    - 'git diff --cached --quiet && echo "No changes to web content" || git commit -m "chore: update web content from main"'
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${EZ_APPSEC_BRANCH}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual

scan:pipeline:
  stage: ez-appsec
  image:
    name: $EZ_APPSEC_IMAGE
    entrypoint: [""]
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
    EZ_APPSEC_REPORT: "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json"

  script:
    - echo "🔎 Running ez-appsec scan..."
    - mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"
    - ez-appsec status || true
    - ez-appsec gitlab-scan . --output "${EZ_APPSEC_REPORT}"

  artifacts:
    name: "ez-appsec-scan-${CI_COMMIT_SHA}"
    paths:
      - "${EZ_APPSEC_REPORT}"
    expire_in: 7 days
    when: always

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual

update:vulns:
  stage: ez-appsec
  image: alpine:3.18
  needs:
    - job: scan:pipeline
      artifacts: true
  script:
    - apk add --no-cache git
    - git config user.email "ci@ez-appsec.ai"
    - git config user.name "ez-appsec CI"
    - git fetch origin "${EZ_APPSEC_BRANCH}" || true
    - git checkout -B "${EZ_APPSEC_BRANCH}" "origin/${EZ_APPSEC_BRANCH}" 2>/dev/null || git checkout -B "${EZ_APPSEC_BRANCH}"
    - mkdir -p public/data
    - cp "${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json" public/data/vulnerabilities.json
    - git add public/data/vulnerabilities.json
    - 'git diff --cached --quiet && echo "No vulnerability report changes" || git commit -m "chore: update vulnerability report"'
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${EZ_APPSEC_BRANCH}"
  variables:
    EZ_APPSEC_OUTPUT_DIR: "scan-results"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: manual

pages:
  stage: deploy
  image: alpine:3.18
  script:
    - echo "Deploying public/ to GitLab Pages"
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $EZ_APPSEC_BRANCH'
      when: always
