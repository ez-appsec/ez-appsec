          "medium":   sum(1 for x in v if x.get("severity") == "medium"),
          "low":      sum(1 for x in v if x.get("severity") == "low"),
      }
      now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
      entry = {
          "slug":         SLUG,
          "name":         os.environ["CI_PROJECT_NAME"],
          "path":         os.environ["CI_PROJECT_PATH"],
          "last_updated": now,
          "summary":      summary,
      }

      idx_content, _ = get_file("public/data/index.json")
      idx = json.loads(idx_content) if idx_content else {"projects": []}
      idx["projects"] = [p for p in idx.get("projects", []) if p.get("slug") != SLUG] + [entry]
      idx["last_updated"] = now

      config_content = json.dumps({
          "gitlab_url":        f"https://{os.environ['CI_SERVER_HOST']}",
          "project_id":        os.environ["CI_PROJECT_ID"],
          "project_path":      os.environ["CI_PROJECT_PATH"],
          "ez_appsec_version": os.environ.get("EZ_APPSEC_VERSION", "latest"),
      })

      vuln_b64   = base64.b64encode(open(REPORT, "rb").read()).decode()
      idx_b64    = base64.b64encode(json.dumps(idx, indent=2).encode()).decode()
      config_b64 = base64.b64encode(config_content.encode()).decode()

      def action(path, content_b64):
          existing, _ = get_file(path)
          return {"action": "update" if existing else "create",
                  "file_path": path, "content": content_b64, "encoding": "base64"}

      actions = [
          action(f"public/data/projects/{SLUG}/vulnerabilities.json", vuln_b64),
          action(f"public/data/projects/{SLUG}/config.json",          config_b64),
          action("public/data/index.json",                             idx_b64),
      ]

      result = api("POST", "repository/commits", {
          "branch":         "main",
          "commit_message": f"chore: ingest scan results from {os.environ['CI_PROJECT_PATH']}",
          "actions":        actions,
      })
      print(f"Dashboard updated: {result['web_url']}")
      print(f"Vulnerabilities: {summary}")
      PYEOF
  artifacts:
    name: "ez-appsec-cold-scan-${CI_COMMIT_SHA}"
    paths:
      - "${EZ_APPSEC_REPORT}"
    expire_in: 7 days
    when: always
  rules:
    - if: '$EZ_APPSEC_DASHBOARD_PROJECT == null'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
