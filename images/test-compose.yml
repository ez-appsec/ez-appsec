version: '3.8'

services:
  # OWASP Juice Shop - Modern Node.js/Angular vulnerable app
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: ez-appsec-juice-shop
    ports:
      - "${JUICE_SHOP_PORT:-3000}:3000"
    networks:
      - ez-appsec-test-net
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # DVWA - Damn Vulnerable Web Application (PHP/MySQL)
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: ez-appsec-dvwa
    ports:
      - "${DVWA_PORT:-8080}:80"
    networks:
      - ez-appsec-test-net
    depends_on:
      - dvwa-db
    environment:
      - RECAPTCHA_ENABLE=false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # DVWA Database (MySQL)
  dvwa-db:
    image: mysql:5.7
    container_name: ez-appsec-dvwa-db
    networks:
      - ez-appsec-test-net
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
    volumes:
      - dvwa-db-data:/var/lib/mysql

  # WebGoat - Java-based vulnerable application
  webgoat:
    image: webgoat/goatandwolf:latest
    container_name: ez-appsec-webgoat
    ports:
      - "8081:8080"
      - "9090:9090"
    networks:
      - ez-appsec-test-net
    environment:
      - WEBWOLF_HOST=webwolf
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/WebGoat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # bWAPP - Buggy Web Application (PHP)
  bwapp:
    image: raesene/bwapp:latest
    container_name: ez-appsec-bwapp
    ports:
      - "8082:80"
    networks:
      - ez-appsec-test-net
    environment:
      - MYSQL_ROOT_PASSWORD=bug
      - MYSQL_DATABASE=bwapp
      - MYSQL_USER=bwapp
      - MYSQL_PASSWORD=bug
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/bwapp/install.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  ez-appsec-test-net:
    driver: bridge

volumes:
  dvwa-db-data:
