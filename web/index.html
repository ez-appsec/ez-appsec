<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ez-appsec: Vulnerability Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>🛡️ ez-appsec Vulnerability Dashboard</h1>
            <p class="subtitle">AI-powered application security scanning results</p>
        </div>
    </header>

    <main class="container">
        <section class="controls">
            <div class="filters">
                <div class="filter-group">
                    <label for="severity-filter">Severity:</label>
                    <select id="severity-filter">
                        <option value="">All Levels</option>
                        <option value="critical">🔴 Critical</option>
                        <option value="high">🟠 High</option>
                        <option value="medium">🟡 Medium</option>
                        <option value="low">🟢 Low</option>
                        <option value="info">🔵 Info</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="scanner-filter">Scanner:</label>
                    <select id="scanner-filter">
                        <option value="">All Scanners</option>
                        <option value="gitleaks">Gitleaks</option>
                        <option value="semgrep">Semgrep</option>
                        <option value="kics">KICS</option>
                        <option value="grype">Grype</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="search-filter">Search:</label>
                    <input 
                        type="text" 
                        id="search-filter" 
                        placeholder="Search vulnerabilities, files, or descriptions..."
                    >
                </div>

                <button id="reset-filters" class="btn btn-secondary">Reset Filters</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Total Issues:</span>
                    <span class="stat-value" id="total-count">0</span>
                </div>
                <div class="stat critical">
                    <span class="stat-label">Critical:</span>
                    <span class="stat-value" id="critical-count">0</span>
                </div>
                <div class="stat high">
                    <span class="stat-label">High:</span>
                    <span class="stat-value" id="high-count">0</span>
                </div>
                <div class="stat medium">
                    <span class="stat-label">Medium:</span>
                    <span class="stat-value" id="medium-count">0</span>
                </div>
                <div class="stat low">
                    <span class="stat-label">Low:</span>
                    <span class="stat-value" id="low-count">0</span>
                </div>
            </div>
        </section>

        <section class="vulnerabilities-section">
            <h2>Vulnerabilities</h2>
            <div id="vulnerabilities-container" class="vulnerabilities-list">
                <div class="loading">Loading vulnerabilities...</div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Generated by <strong>ez-appsec</strong> | AI-powered security scanning</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
